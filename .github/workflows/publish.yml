name: Publish Engine to GitHub Packages

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          ./mvnw versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Deploy engine and openapi-validation to GitHub Packages
        run: ./mvnw deploy -pl engine,openapi-validation -am -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
