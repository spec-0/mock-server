name: Publish Engine to GitHub Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Maven version to publish (e.g. 1.0.0). Used only for manual runs; tag pushes use the tag.'
        required: true
        default: '1.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Maven version (from tag or manual input)
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="${{ github.event.inputs.version }}"
          fi
          echo "Publishing io.spec0:* version $VER"
          ./mvnw versions:set -DnewVersion="$VER" -DgenerateBackupPoms=false

      - name: Deploy engine and openapi-validation to GitHub Packages
        run: ./mvnw -B deploy -pl engine,openapi-validation -am -DskipTests -Pgithub-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
