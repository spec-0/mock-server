# Submits Maven transitive dependencies to GitHub's dependency graph from the **reactor root**
# (parent `pom.xml`). This resolves internal `io.spec0:*:1.0-SNAPSHOT` modules in one build.
#
# GitHub "Automatic dependency submission" (Settings → Advanced Security → Dependency graph) can
# inject a separate `submit-maven (dynamic)` job that runs against individual module POMs. Those
# runs use a fresh local repository and fail with "Could not find artifact" for engine / openapi
# validation because those JARs are not published to Maven Central. If you see that failure, set
# Automatic dependency submission to **Disabled** for this repository and rely on this workflow
# instead (or accept the failing duplicate runs alongside your normal CI).
#
# https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/configuring-automatic-dependency-submission-for-your-repository
name: Maven dependency submission

on:
  push:
    branches: [main]
    paths:
      - '**/pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: .
          maven-args: -Dskip.ui.copy=true
